<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aiohttp WebRTC</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f3ee;
        color: #17201c;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1040px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 28px;
        line-height: 1.2;
        margin: 0;
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid #1f2a25;
        background: #1f2a25;
        color: #fff;
        border-radius: 6px;
        min-height: 40px;
        padding: 0 14px;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        color: #1f2a25;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #111;
        object-fit: cover;
        border-radius: 8px;
      }

      .status {
        margin-top: 14px;
        padding: 12px 0;
        border-top: 1px solid rgba(31, 42, 37, 0.18);
        font-size: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      @media (max-width: 720px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>aiohttp WebRTC</h1>
        <div class="controls">
          <button id="start">Start</button>
          <button class="secondary" id="stop" disabled>Stop</button>
        </div>
      </header>
      <video id="preview" autoplay muted playsinline></video>
      <div class="status" id="status">Idle</div>
    </main>

    <script>
      const startButton = document.querySelector("#start");
      const stopButton = document.querySelector("#stop");
      const preview = document.querySelector("#preview");
      const statusBox = document.querySelector("#status");

      let pc = null;
      let stream = null;
      let signaling = null;

      function setStatus(message) {
        statusBox.textContent = message;
      }

      async function start() {
        startButton.disabled = true;
        setStatus("Requesting local camera and microphone...");

        stream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } },
        });
        preview.srcObject = stream;

        signaling = new WebSocket("ws://127.0.0.1:8082/ws");
        await new Promise((resolve, reject) => {
          signaling.addEventListener("open", resolve, { once: true });
          signaling.addEventListener("error", reject, { once: true });
        });

        pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
        });

        signaling.addEventListener("message", async (event) => {
          const message = JSON.parse(event.data);
          if (message.type === "answer") {
            await pc.setRemoteDescription(message.description);
            stopButton.disabled = false;
            setStatus(`Connection: ${pc.connectionState}\nICE: ${pc.iceConnectionState}`);
          } else if (message.type === "error") {
            throw new Error(message.message);
          }
        });

        pc.addEventListener("connectionstatechange", () => {
          setStatus(`Connection: ${pc.connectionState}\nICE: ${pc.iceConnectionState}`);
          if (["closed", "failed", "disconnected"].includes(pc.connectionState)) {
            stop();
          }
        });

        pc.addEventListener("icecandidate", ({ candidate }) => {
          if (signaling && signaling.readyState === WebSocket.OPEN) {
            signaling.send(JSON.stringify({ type: "candidate", candidate }));
          }
        });

        for (const track of stream.getTracks()) {
          pc.addTrack(track, stream);
        }

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        signaling.send(
          JSON.stringify({
            type: "offer",
            description: pc.localDescription,
          })
        );
        setStatus("Offer sent. Connecting...");
      }

      function stop() {
        stopButton.disabled = true;

        if (signaling) {
          signaling.close();
          signaling = null;
        }
        if (pc) {
          pc.close();
          pc = null;
        }
        if (stream) {
          for (const track of stream.getTracks()) {
            track.stop();
          }
          stream = null;
        }
        preview.srcObject = null;
        startButton.disabled = false;
        setStatus("Stopped");
      }

      startButton.addEventListener("click", () => {
        start().catch((error) => {
          setStatus(`Error: ${error.message}`);
          stop();
        });
      });
      stopButton.addEventListener("click", stop);
    </script>
  </body>
</html>
